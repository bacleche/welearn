<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICONNECT Learning – Connexion</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #4f46e5;
      --primary-d: #3730a3;
      --accent:    #06b6d4;
      --bg:        #f8faff;
      --surface:   #ffffff;
      --text:      #1e1b4b;
      --muted:     #6b7280;
      --border:    #e0e7ff;
      --radius:    12px;
      --shadow:    0 8px 32px rgba(79,70,229,.12);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 5%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: .05em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 500;
      font-size: .9rem;
      transition: color .2s;
    }

    .nav-links a:hover { color: var(--primary); }

    .auth-buttons { display: flex; gap: .75rem; align-items: center; }

    .btn-outline {
      padding: .5rem 1.2rem;
      border: 2px solid var(--primary);
      color: var(--primary);
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: .85rem;
      transition: all .2s;
    }
    .btn-outline:hover { background: var(--primary); color: #fff; }

    .btn-primary {
      padding: .5rem 1.2rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-primary:hover { background: var(--primary-d); transform: translateY(-1px); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(79,70,229,.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(6,182,212,.07) 0%, transparent 50%),
        var(--bg);
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-card .badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: #ede9fe;
      color: var(--primary);
      font-size: .75rem;
      font-weight: 600;
      padding: .25rem .75rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .auth-card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: .4rem;
    }

    .auth-card p.sub {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    .auth-card p.sub a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    /* ── FORM ── */
    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .4rem;
    }

    .field input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
      background: #fff;
    }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .83rem;
      color: var(--muted);
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
    }

    .forgot {
      font-size: .83rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .forgot:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: .5rem;
    }
    .btn-submit:hover { opacity: .9; transform: translateY(-1px); }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      position: relative;
      color: var(--muted);
      font-size: .82rem;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: .75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      text-decoration: none;
    }
    .btn-google:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(79,70,229,.1);
    }

    .google-icon { width: 20px; height: 20px; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: .82rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>


<!-- MAIN -->
<main>
  <div class="auth-card">
    <span class="badge">🔒 Accès sécurisé</span>
    <h1>Bon retour !</h1>
    <p class="sub">Pas encore de compte ? <a href="register.html">S'inscrire gratuitement</a> || <a href="index.html">retour à l'accueil</a></p>

    <form>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="vous@exemple.com" required>
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="field-row">
        <label class="checkbox-label">
          <input type="checkbox"> Se souvenir de moi
        </label>
        <a href="#" class="forgot">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <div class="divider">ou continuer avec</div>

    <a href="#" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </a>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <p>© 2026 ICONNECT – Tous droits réservés</p>
</footer>

<script src="script.js"></script>
</body>
</html>
